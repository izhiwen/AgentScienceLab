name: Release ASL

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload assets to, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Platform set for v0.2.0+:
        # - macos-latest (macos-14, Apple Silicon)            → darwin-aarch64
        # - windows-latest (preview, no ps1 installer yet)    → windows-x86_64
        # Linux x86_64 dropped in v0.2.0 to match upstream aiplus
        # (commit 59af425 narrowed pre-built binary platforms).
        # Intel Mac (darwin-x86_64) also dropped — Owner directive.
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout ASL
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vendor/aiplus/target
          key: ${{ runner.os }}-cargo-asl-${{ hashFiles('vendor/aiplus/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-asl-

      - name: Package ASL
        # Windows runner uses git-bash (default for `shell: bash`) so the
        # POSIX build-asl.sh runs there too. uname -s on git-bash returns
        # MINGW64_NT-*, which scripts/build-asl.sh maps to "windows".
        shell: bash
        env:
          # Strip leading 'v' from tag (v0.1.3 -> 0.1.3) so asset filenames
          # match the release tag. Falls through to scripts/build-asl.sh default
          # when run outside a tag push.
          ASL_VERSION: ${{ inputs.release_tag != '' && (startsWith(inputs.release_tag, 'v') && format('{0}', inputs.release_tag) || inputs.release_tag) || (startsWith(github.ref_name, 'v') && github.ref_name || '') }}
        run: |
          set -euo pipefail
          # Normalize: strip leading 'v' if present.
          if [ -n "${ASL_VERSION}" ]; then
            ASL_VERSION="${ASL_VERSION#v}"
            export ASL_VERSION
          fi
          scripts/build-asl.sh --package
          for asset in dist/*.tar.gz; do
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$asset" > "$asset.sha256"
            else
              sha256sum "$asset" > "$asset.sha256"
            fi
          done
          ls -l dist/*.tar.gz
          ls -l dist/*.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asl-${{ runner.os }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        # Force bash on Windows too — the script uses `\` line continuation
        # which PowerShell (the windows-latest default) parses as a unary
        # operator and fails on.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "ASL ${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" dist/*.tar.gz dist/*.sha256 --clobber
