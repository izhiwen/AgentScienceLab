schema_version = "1.0"

[agent]
role = "literature-reviewer"
display_name = "Literature Reviewer"
tier = "internal_core"
default_specialty = "agent-research-field-positioning"
warm_bench_ttl_seconds = 1800

[persona]
system_prompt_file = "personas/literature-reviewer.md"
voice = "literature-reviewer"
escalation_target = "pi"

[workspace]
needs_worktree = false
worktree_branch = "agent/literature-reviewer"
worktree_path = "../{project_name}.literature-reviewer"

[memory]
personal_dir = ".aiplus/agent-memory/literature-reviewer"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["文献定位", "领域定位", "相关工作", "研究脉络"]
english_aliases = ["literature-reviewer", "field-positioning", "related-work", "prior-work", "agent-literature"]
