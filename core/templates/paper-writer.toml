schema_version = "1.0"

[agent]
role = "paper-writer"
display_name = "Paper Writer"
tier = "internal_core"
default_specialty = "claim-calibrated-agent-paper-writing"
warm_bench_ttl_seconds = 1800

[persona]
system_prompt_file = "personas/paper-writer.md"
voice = "paper-writer"
escalation_target = "pi"

[workspace]
needs_worktree = false
worktree_branch = "agent/paper-writer"
worktree_path = "../{project_name}.paper-writer"

[memory]
personal_dir = ".aiplus/agent-memory/paper-writer"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["论文写作", "主张表述", "结果呈现", "限制说明"]
english_aliases = ["paper-writer", "claim-writing", "evidence-presentation", "limitations-writing", "rebuttal-drafting"]
