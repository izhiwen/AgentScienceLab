schema_version = "1.0"

[agent]
role = "editor"
display_name = "Editor"
tier = "internal_core"
default_specialty = "review-coordination"
warm_bench_ttl_seconds = 1800

[persona]
system_prompt_file = "personas/editor.md"
voice = "editor"
escalation_target = "pi"

[workspace]
needs_worktree = false
worktree_branch = "agent/editor"
worktree_path = "../{project_name}.editor"

[memory]
personal_dir = ".aiplus/agent-memory/editor"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["编辑", "评审编辑", "审稿主编", "审稿协调员"]
english_aliases = ["editor", "review-editor", "review-coordinator", "review-chair", "editorial"]
