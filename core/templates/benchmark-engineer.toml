schema_version = "1.0"

[agent]
role = "benchmark-engineer"
display_name = "Benchmark Engineer"
tier = "internal_core"
default_specialty = "benchmark-feasibility"
warm_bench_ttl_seconds = 1800

[persona]
system_prompt_file = "personas/benchmark-engineer.md"
voice = "benchmark-engineer"
escalation_target = "pi"

[workspace]
needs_worktree = false
worktree_branch = "agent/benchmark-engineer"
worktree_path = "../{project_name}.benchmark-engineer"

[memory]
personal_dir = ".aiplus/agent-memory/benchmark-engineer"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["基准工程", "基准可行性", "评测环境", "benchmark"]
english_aliases = ["benchmark-engineer", "benchmark-feasibility", "harness-audit", "dataset-audit", "benchmark-review"]
