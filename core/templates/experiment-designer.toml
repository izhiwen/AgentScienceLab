schema_version = "1.0"

[agent]
role = "experiment-designer"
display_name = "Experiment Designer"
tier = "internal_core"
default_specialty = "experiment-design"
warm_bench_ttl_seconds = 1800

[persona]
system_prompt_file = "personas/experiment-designer.md"
voice = "experiment-designer"
escalation_target = "pi"

[workspace]
needs_worktree = false
worktree_branch = "agent/experiment-designer"
worktree_path = "../{project_name}.experiment-designer"

[memory]
personal_dir = ".aiplus/agent-memory/experiment-designer"
read_team_memory = true
read_project_memory = true
write_team_memory = false

[invocation]
chinese_aliases = ["实验设计", "实验设计师", "研究设计"]
english_aliases = ["experiment-designer", "experiment-design", "study-design", "design-review", "ablation-plan"]
